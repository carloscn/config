[General]
ipv6 = false
bypass-system = true
skip-proxy = 192.168.0.0/16,10.0.0.0/8,...（保持原样）
bypass-tun = 10.0.0.0/8,100.64.0.0/10,...（保留 100.64）

dns-server = https://dns.alidns.com/dns-query, https://doh.pub/dns-query

[Rule]
# Tailscale 必备（最上面）
IP-CIDR,100.64.0.0/10,TAILSCALE

# ←←← 在这里添加你想走 SS 的网站 ↓↓↓
DOMAIN-SUFFIX,example.com,🏠 Tailscale-SS
DOMAIN-SUFFIX,openai.com,🏠 Tailscale-SS
# ...继续加你需要的

# 国内一般直连
GEOIP,CN,DIRECT

# 最终全部直连（这就是你想要的效果）
FINAL,DIRECT
